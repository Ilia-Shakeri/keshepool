version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoodsub_user
      POSTGRES_PASSWORD: zoodsub_password
      POSTGRES_DB: zoodsub_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoodsub_user -d zoodsub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://zoodsub_user:zoodsub_password@db:5432/zoodsub_db
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN}
      # Base URL only. The path is appended in the Python code.
      - WEBHOOK_URL=${WEBHOOK_URL:-https://your-domain.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://your-domain.com/api

volumes:
  pgdata:
  redisdata: