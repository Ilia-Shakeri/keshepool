services:
  db:
    image: postgres:15-alpine
    container_name: keshepool-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keshepool_internal_net

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: keshepool-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    networks:
      - keshepool_internal_net

  redis:
    image: redis:7-alpine
    container_name: keshepool-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keshepool_internal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keshepool-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_BOT_TOKEN=${ADMIN_BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEB_APP_URL=${WEB_APP_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - TETRA98_API_URL=${TETRA98_API_URL}
      - TETRA98_API_KEY=${TETRA98_API_KEY}
      - TETRA98_WEBHOOK_SECRET=${TETRA98_WEBHOOK_SECRET:-}
      - CRYPTO_WEBHOOK_SECRET=${CRYPTO_WEBHOOK_SECRET:-}
      - CRYPTO_DEPOSIT_ADDRESS_USDT=${CRYPTO_DEPOSIT_ADDRESS_USDT:-}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - ADMIN_GROUP_CHAT_ID=${ADMIN_GROUP_CHAT_ID:-}
      - ASSET_ROOT=/app/static
      - PUBLIC_ASSET_BASE_URL=/static
      - ALLOW_INSECURE_DEV_AUTH=${ALLOW_INSECURE_DEV_AUTH:-false}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - keshepool_internal_net
      - caddy_gateway_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keshepool-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${WEBHOOK_URL}/api
      - NEXT_PUBLIC_BOT_USERNAME=${NEXT_PUBLIC_BOT_USERNAME:-keshepoolbot}
    networks:
      - keshepool_internal_net
      - caddy_gateway_net

volumes:
  pgdata:
  redisdata:

networks:
  keshepool_internal_net:
    name: keshepool_internal_net
  caddy_gateway_net:
    external: true