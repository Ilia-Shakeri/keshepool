x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:15-alpine
    container_name: keshepool-db
    restart: unless-stopped
    # Give Postgres time to checkpoint and flush WAL on shutdown — prevents corruption.
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Named volume — survives `down`, `up`, and `--build`. Mapping unchanged on purpose
      # so existing data keeps its identity and is never re-initialised.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keshepool_internal_net
    logging: *default-logging

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: keshepool-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Run every 6 hours for tight recovery point objective.
      SCHEDULE: "@every 6h"
      # Layered retention — short-term granularity plus long-term history.
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      # gzip level 6 — smaller dumps without heavy CPU cost.
      POSTGRES_EXTRA_OPTS: "-Z6"
      BACKUP_MAX_AGE_SECONDS: ${BACKUP_MAX_AGE_SECONDS:-28800}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind to host so dumps survive even total stack teardown and are reachable for off-site sync.
      - ./backups:/backups
      - ./scripts/check-backup.sh:/usr/local/bin/check-backup:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "/usr/local/bin/check-backup"]
      interval: 10m
      timeout: 30s
      retries: 3
      start_period: 6h30m
    networks:
      - keshepool_internal_net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: keshepool-redis
    restart: unless-stopped
    # AOF persistence — webhook idempotency keys survive restarts, blocking double-credit.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keshepool_internal_net
    logging: *default-logging

  static-init:
    image: ${BACKEND_IMAGE:-keshepool-backend:local}
    build:
      context: ./backend
    user: root
    command: ["sh", "-c", "mkdir -p /app/static && chown -R appuser:appuser /app/static"]
    restart: "no"
    volumes:
      - ./static:/app/static
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE:-keshepool-backend:local}
    build:
      context: ./backend
    container_name: keshepool-backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_BOT_TOKEN=${ADMIN_BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEB_APP_URL=${WEB_APP_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - TETRA98_API_URL=${TETRA98_API_URL}
      - TETRA98_API_KEY=${TETRA98_API_KEY}
      - TETRA98_WEBHOOK_SECRET=${TETRA98_WEBHOOK_SECRET:-}
      - CRYPTO_WEBHOOK_SECRET=${CRYPTO_WEBHOOK_SECRET:-}
      - CRYPTO_DEPOSIT_ADDRESS_USDT=${CRYPTO_DEPOSIT_ADDRESS_USDT:-}
      - USDT_TO_IRR_RATE=${USDT_TO_IRR_RATE:?Set an operator-reviewed emergency USDT rate in .env}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - ADMIN_GROUP_CHAT_ID=${ADMIN_GROUP_CHAT_ID:-}
      - ADMIN_REPORT_LANGUAGE=${ADMIN_REPORT_LANGUAGE:-fa}
      - BOT_USERNAME=${BOT_USERNAME:-keshepoolbot}
      - ASSET_ROOT=/app/static
      - PUBLIC_ASSET_BASE_URL=/static
      - SUPPORT_TELEGRAM_USERNAME=${SUPPORT_TELEGRAM_USERNAME:-}
      - ALLOW_INSECURE_DEV_AUTH=${ALLOW_INSECURE_DEV_AUTH:-false}
      - TELEGRAM_AUTH_MAX_AGE_SECONDS=${TELEGRAM_AUTH_MAX_AGE_SECONDS:-86400}
      - TELEGRAM_AUTH_FUTURE_SKEW_SECONDS=${TELEGRAM_AUTH_FUTURE_SKEW_SECONDS:-60}
      - USER_LAST_SEEN_WRITE_INTERVAL_SECONDS=${USER_LAST_SEEN_WRITE_INTERVAL_SECONDS:-300}
      - CACHE_NAMESPACE=${CACHE_NAMESPACE:-keshepool}
      - REDIS_CONNECT_TIMEOUT_SECONDS=${REDIS_CONNECT_TIMEOUT_SECONDS:-2}
      - REDIS_SOCKET_TIMEOUT_SECONDS=${REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./static:/app/static
    depends_on:
      static-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - keshepool_internal_net
      - caddy_gateway_net
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE:-keshepool-frontend:local}
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: /api
        DEPLOYMENT_VERSION: ${IMAGE_TAG:-local}
    container_name: keshepool-frontend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend:8000
      - PUBLIC_BASE_URL=${WEB_APP_URL}
      - DEPLOYMENT_VERSION=${IMAGE_TAG:-local}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          (async () => {
            try {
              const response = await fetch('http://127.0.0.1:3000/health/live', { signal: AbortSignal.timeout(3000) });
              const body = (await response.text()).slice(0, 500);
              if (!response.ok) {
                console.error('frontend health HTTP ' + response.status + ': ' + body);
                process.exit(1);
              }
              let payload;
              try { payload = JSON.parse(body); } catch (error) {
                console.error('frontend health malformed response: ' + error.name + ': ' + error.message);
                process.exit(1);
              }
              if (payload.status !== 'alive') {
                console.error('frontend health invalid body: ' + body);
                process.exit(1);
              }
              console.log('frontend health ok: HTTP ' + response.status);
            } catch (error) {
              console.error('frontend health ' + (error.name || 'Error') + ': ' + (error.message || String(error)));
              process.exit(1);
            }
          })();
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - keshepool_internal_net
      - caddy_gateway_net
    logging: *default-logging

volumes:
  pgdata:
  redisdata:

networks:
  keshepool_internal_net:
    name: keshepool_internal_net
  caddy_gateway_net:
    external: true
